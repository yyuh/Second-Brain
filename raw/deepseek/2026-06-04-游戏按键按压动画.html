<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>游戏按键 - 纯立体按压 | 主题 #56C294</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #1a2a24, #0a1210);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Orbitron', 'Courier New', monospace;
            padding: 30px;
            overflow-x: hidden;
        }

        /* 游戏内嵌容器 */
        .game-demo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 45px;
            background: rgba(12, 22, 18, 0.6);
            backdrop-filter: blur(6px);
            border-radius: 52px;
            padding: 40px 50px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(86, 194, 148, 0.2);
            border: 1px solid rgba(86, 194, 148, 0.35);
            position: relative;
            overflow: visible;
        }

        /* 主按键区域容器 */
        .button-area {
            position: relative;
            width: 300px;
            display: flex;
            justify-content: center;
        }

        /* 主按键容器 - 长方形立体按键 */
        .rect-button-3d {
            position: relative;
            width: 300px;
            height: 115px;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.08s cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity 0.2s, filter 0.2s;
            z-index: 10;
        }

        /* 禁用状态：变暗，降低饱和度，不可点击 */
        .rect-button-3d.disabled {
            cursor: default;
            pointer-events: none;
            filter: brightness(0.55) saturate(0.6);
            opacity: 0.7;
            transform: translateY(4px);
        }

        .rect-button-3d.disabled .button-face {
            box-shadow: 0 6px 0 #1a5e3f;
        }

        /* 按键正面 */
        .button-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #4cae82, #2c8f62);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            box-shadow: 0 12px 0 #1a5e3f, 0 8px 20px rgba(0, 0, 0, 0.5), inset 0 2px 3px rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(86, 194, 148, 0.75);
            transition: all 0.08s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            background-image: radial-gradient(circle at 20% 35%, rgba(210, 255, 200, 0.12) 2%, transparent 3%);
            background-size: 28px 28px;
            z-index: 2;
            overflow: hidden;
        }

        /* 按键内容 */
        .button-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        /* 静态骰子图标（按键上原有的小骰子） */
        .static-dice {
            font-size: 44px;
            display: inline-block;
            filter: drop-shadow(0 3px 5px rgba(0, 0, 0, 0.3));
        }

        .go-text {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 52px;
            letter-spacing: 5px;
            background: linear-gradient(135deg, #FFF5CF, #FFE0A3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
        }

        /* 立体阴影层 */
        .button-shadow-layer {
            position: absolute;
            bottom: -8px;
            left: 8px;
            width: calc(100% - 16px);
            height: 18px;
            background: rgba(0, 0, 0, 0.55);
            border-radius: 28px;
            filter: blur(7px);
            z-index: 1;
            transition: all 0.08s ease;
            opacity: 0.7;
        }

        /* 按压时的光波扩散 */
        .press-wave {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0%;
            height: 0%;
            background: radial-gradient(circle, rgba(86, 194, 148, 0.7) 0%, rgba(70, 180, 130, 0.4) 60%, rgba(50, 150, 100, 0) 100%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
            animation: waveBurst 0.5s ease-out forwards;
        }

        @keyframes waveBurst {
            0% {
                width: 0%;
                height: 0%;
                opacity: 0.8;
            }
            100% {
                width: 320%;
                height: 320%;
                opacity: 0;
            }
        }

        /* 信息面板 */
        .info-panel {
            background: rgba(0, 20, 12, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 8px 24px;
            font-family: monospace;
            color: #bce6d4;
            font-size: 14px;
            border: 1px solid rgba(86, 194, 148, 0.5);
            text-align: center;
        }

        .info-panel strong {
            color: #7ae9bc;
        }

        /* 辅助按键组 */
        .extra-buttons {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 10px;
        }

        .mini-rect {
            position: relative;
            width: 160px;
            height: 70px;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.07s cubic-bezier(0.2, 0.9, 0.5, 1);
        }

        .mini-rect .mini-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #489c74, #2a7e56);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 0 #155f3e, inset 0 1px 2px rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(86, 194, 148, 0.7);
            transition: all 0.07s ease;
        }

        .mini-rect .mini-shadow {
            position: absolute;
            bottom: -6px;
            left: 6px;
            width: calc(100% - 12px);
            height: 12px;
            background: rgba(0, 0, 0, 0.5);
            filter: blur(5px);
            border-radius: 20px;
            transition: all 0.07s ease;
            opacity: 0.7;
            z-index: 0;
        }

        .mini-rect.pressed-mini {
            transform: translateY(6px);
        }

        .mini-rect.pressed-mini .mini-face {
            box-shadow: 0 3px 0 #155f3e;
            background: linear-gradient(145deg, #3a8a62, #226a46);
            border-color: #56c294;
        }

        .mini-label {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            font-weight: bold;
            color: #fbffcf;
        }

        .mini-desc {
            font-size: 11px;
            font-weight: 700;
            color: #e2ffe6;
            background: rgba(20, 70, 40, 0.6);
            padding: 2px 10px;
            border-radius: 30px;
        }

        .key-hint {
            display: flex;
            gap: 20px;
            margin-top: 8px;
            font-size: 12px;
            color: #b1ddcc;
            flex-wrap: wrap;
            justify-content: center;
        }

        .key-hint span {
            background: #10261ecc;
            padding: 4px 14px;
            border-radius: 32px;
            font-family: monospace;
            font-weight: bold;
            border-left: 2px solid #56c294;
        }

        @media (max-width: 680px) {
            .rect-button-3d {
                width: 260px;
                height: 100px;
            }
            .go-text {
                font-size: 44px;
            }
            .static-dice {
                font-size: 38px;
            }
            .mini-rect {
                width: 130px;
                height: 60px;
            }
            .game-demo-container {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>
<div class="game-demo-container">
    <div style="text-align: center; font-family: monospace; color:#56c294b3; margin-bottom: 2px; font-size: 13px; letter-spacing: 2px;">
        🎲 立体按压按键 · 无骰子动画 🎲
    </div>
    
    <div class="button-area">
        <div class="rect-button-3d" id="primaryButton">
            <div class="button-face">
                <div class="button-content">
                    <span class="static-dice">🎲</span>
                    <span class="go-text">GO！</span>
                </div>
            </div>
            <div class="button-shadow-layer"></div>
        </div>
    </div>

    <div class="info-panel">
        🎲 <strong>按压 GO！</strong> 立体下沉 + 光效反馈 🎲<br>
        ⚡ 按键变暗并禁用 <strong>0.3秒</strong>，恢复后可再次按压
    </div>

    <div class="extra-buttons">
        <div class="mini-rect" id="btnJump">
            <div class="mini-face">
                <span class="mini-label">B</span>
                <span class="mini-desc">JUMP</span>
            </div>
            <div class="mini-shadow"></div>
        </div>
        <div class="mini-rect" id="btnSkill">
            <div class="mini-face">
                <span class="mini-label">X</span>
                <span class="mini-desc">SKILL</span>
            </div>
            <div class="mini-shadow"></div>
        </div>
        <div class="mini-rect" id="btnUltra">
            <div class="mini-face">
                <span class="mini-label">Y</span>
                <span class="mini-desc">ULTRA</span>
            </div>
            <div class="mini-shadow"></div>
        </div>
    </div>
    <div class="key-hint">
        <span>🖱️ 点击主键 → 立体按压+光效</span>
        <span>⌨️ 键盘 ENTER / A / SPACE</span>
        <span>⏳ 按键禁用0.3秒</span>
        <span>💚 主题 #56C294</span>
    </div>
</div>

<script>
    (function() {
        // ---------- 核心常量：按键禁用时长（无骰子动画，仅保留按压反馈）----------
        const BUTTON_COOLDOWN_DURATION = 300; // 毫秒（0.3秒）
        
        const mainBtn = document.getElementById('primaryButton');
        
        // 禁用状态标志 & 定时器管理
        let isCooldown = false;
        let cooldownTimer = null;
        
        // 按下波纹特效（仅视觉）
        function createWave(parent) {
            const wave = document.createElement('div');
            wave.className = 'press-wave';
            parent.style.position = 'relative';
            parent.appendChild(wave);
            wave.addEventListener('animationend', () => {
                if (wave.parentNode) wave.parentNode.removeChild(wave);
            });
        }
        
        // 额外冲击环 (仅视觉)
        function createImpactRing(parent) {
            const ring = document.createElement('div');
            ring.className = 'impact-ring';
            ring.style.position = 'absolute';
            ring.style.top = '50%';
            ring.style.left = '50%';
            ring.style.width = '30px';
            ring.style.height = '30px';
            ring.style.border = '2.5px solid rgba(86, 194, 148, 0.9)';
            ring.style.borderRadius = '40px';
            ring.style.transform = 'translate(-50%, -50%) scale(0)';
            ring.style.opacity = '0';
            ring.style.pointerEvents = 'none';
            ring.style.zIndex = '9';
            parent.appendChild(ring);
            ring.animate([
                { transform: 'translate(-50%, -50%) scale(0)', opacity: 0.9, borderWidth: '3px' },
                { transform: 'translate(-50%, -50%) scale(1.9)', opacity: 0, borderWidth: '1px' }
            ], { duration: 400, easing: 'cubic-bezier(0.2, 1.2, 0.8, 1)' });
            setTimeout(() => { if (ring.parentNode) ring.remove(); }, 450);
        }
        
        // 主按键禁用（变暗 + 不可点击）
        function disableButton() {
            if (!mainBtn) return;
            mainBtn.classList.add('disabled');
        }
        
        // 主按键恢复（去除禁用样式，重新可交互）
        function enableButton() {
            if (!mainBtn) return;
            mainBtn.classList.remove('disabled');
        }
        
        // 完全重置冷却状态（用于定时器结束）
        function resetCooldown() {
            isCooldown = false;
            enableButton();
            if (cooldownTimer) {
                clearTimeout(cooldownTimer);
                cooldownTimer = null;
            }
        }
        
        // 主要触发流程: 按键按压 + 视觉特效 + 短暂冷却
        function triggerMainAction(e) {
            if (e) {
                e.preventDefault();
                e.stopPropagation();
            }
            // 冷却中不允许触发
            if (isCooldown) {
                console.log('[按键] 冷却中，无法触发');
                return;
            }
            
            // 1. 立刻禁用按键 + 变暗
            isCooldown = true;
            disableButton();
            
            // 2. 视觉特效：按下波纹 & 冲击环
            createWave(mainBtn);
            createImpactRing(mainBtn);
            
            // 3. 派发游戏事件，供外部监听
            const gameEvent = new CustomEvent('gameButtonPress', {
                detail: {
                    action: 'BUTTON_PRESS',
                    timestamp: Date.now(),
                    duration: BUTTON_COOLDOWN_DURATION,
                    themeColor: '#56C294'
                }
            });
            window.dispatchEvent(gameEvent);
            console.log(`[GO！按键] 立体按压触发 | 按键禁用 ${BUTTON_COOLDOWN_DURATION / 1000}秒`);
            
            // 4. 设定冷却时间后恢复按键
            cooldownTimer = setTimeout(() => {
                resetCooldown();
                console.log('[按键] 冷却结束，按键重新激活');
            }, BUTTON_COOLDOWN_DURATION);
        }
        
        // ----- 绑定主按键事件（鼠标/触摸）-----
        function onMainTrigger(e) {
            if (isCooldown) {
                e.preventDefault();
                return;
            }
            triggerMainAction(e);
        }
        
        mainBtn.addEventListener('mousedown', onMainTrigger);
        mainBtn.addEventListener('touchstart', onMainTrigger, { passive: false });
        
        // 键盘支持：空格 / Enter / A / G 触发
        window.addEventListener('keydown', (e) => {
            const key = e.key;
            if (key === ' ' || key === 'Space' || key === 'Enter' || key === 'a' || key === 'A' || key === 'g' || key === 'G') {
                if (isCooldown) {
                    e.preventDefault();
                    return;
                }
                e.preventDefault();
                triggerMainAction(e);
            } else if (key === 'b' || key === 'B') {
                e.preventDefault();
                const jumpBtn = document.getElementById('btnJump');
                if (jumpBtn) triggerMiniButton(jumpBtn, 'B', 'JUMP');
            } else if (key === 'x' || key === 'X') {
                e.preventDefault();
                const skillBtn = document.getElementById('btnSkill');
                if (skillBtn) triggerMiniButton(skillBtn, 'X', 'SKILL');
            } else if (key === 'y' || key === 'Y') {
                e.preventDefault();
                const ultraBtn = document.getElementById('btnUltra');
                if (ultraBtn) triggerMiniButton(ultraBtn, 'Y', 'ULTRA');
            }
        });
        
        // ---------- 辅助按键独立反馈 ----------
        function triggerMiniButton(btn, keyName, actionName) {
            if (!btn) return;
            btn.classList.add('pressed-mini');
            const faceDiv = btn.querySelector('.mini-face');
            if (faceDiv) {
                faceDiv.style.borderColor = '#8ae6bf';
                setTimeout(() => { if(faceDiv) faceDiv.style.borderColor = ''; }, 120);
            }
            setTimeout(() => { btn.classList.remove('pressed-mini'); }, 130);
            // 辅助简单波纹
            const wave = document.createElement('div');
            wave.className = 'mini-wave';
            wave.style.position = 'absolute';
            wave.style.top = '50%';
            wave.style.left = '50%';
            wave.style.width = '0%';
            wave.style.height = '0%';
            wave.style.background = 'radial-gradient(circle, rgba(86, 194, 148, 0.85), rgba(60, 160, 110, 0.4))';
            wave.style.borderRadius = '50%';
            wave.style.transform = 'translate(-50%, -50%)';
            wave.style.pointerEvents = 'none';
            wave.style.zIndex = '12';
            btn.appendChild(wave);
            wave.animate([
                { width: '0%', height: '0%', opacity: 0.8 },
                { width: '240%', height: '240%', opacity: 0 }
            ], { duration: 450 });
            setTimeout(() => { if(wave.parentNode) wave.remove(); }, 460);
            
            // 冲击小环
            const miniRing = document.createElement('div');
            miniRing.style.position = 'absolute';
            miniRing.style.top = '50%';
            miniRing.style.left = '50%';
            miniRing.style.width = '20px';
            miniRing.style.height = '20px';
            miniRing.style.border = '2.5px solid #56c294';
            miniRing.style.borderRadius = '30px';
            miniRing.style.transform = 'translate(-50%, -50%) scale(0)';
            miniRing.style.opacity = '0.8';
            miniRing.style.pointerEvents = 'none';
            miniRing.style.zIndex = '15';
            btn.appendChild(miniRing);
            miniRing.animate([
                { transform: 'translate(-50%, -50%) scale(0)', opacity: 0.9, borderWidth: '3px' },
                { transform: 'translate(-50%, -50%) scale(1.5)', opacity: 0, borderWidth: '1px' }
            ], { duration: 280 });
            setTimeout(() => { if(miniRing.parentNode) miniRing.remove(); }, 300);
            
            window.dispatchEvent(new CustomEvent('gamePhysicalPress', {
                detail: { key: keyName, action: actionName, timestamp: Date.now() }
            }));
            console.log(`[辅助按键] ${keyName} 按压反馈`);
        }
        
        // 辅助按钮绑定
        const jumpBtn = document.getElementById('btnJump');
        const skillBtn = document.getElementById('btnSkill');
        const ultraBtn = document.getElementById('btnUltra');
        
        if (jumpBtn) {
            jumpBtn.addEventListener('mousedown', (e) => { e.preventDefault(); triggerMiniButton(jumpBtn, 'B', 'JUMP'); });
            jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault(); triggerMiniButton(jumpBtn, 'B', 'JUMP'); }, { passive: false });
        }
        if (skillBtn) {
            skillBtn.addEventListener('mousedown', (e) => { e.preventDefault(); triggerMiniButton(skillBtn, 'X', 'SKILL'); });
            skillBtn.addEventListener('touchstart', (e) => { e.preventDefault(); triggerMiniButton(skillBtn, 'X', 'SKILL'); }, { passive: false });
        }
        if (ultraBtn) {
            ultraBtn.addEventListener('mousedown', (e) => { e.preventDefault(); triggerMiniButton(ultraBtn, 'Y', 'ULTRA'); });
            ultraBtn.addEventListener('touchstart', (e) => { e.preventDefault(); triggerMiniButton(ultraBtn, 'Y', 'ULTRA'); }, { passive: false });
        }
        
        // 防止拖拽
        document.querySelectorAll('.rect-button-3d, .mini-rect').forEach(el => {
            el.addEventListener('dragstart', (e) => e.preventDefault());
        });
        
        // 提供API以便游戏脚本直接调用
        window.GameButtonAPI = {
            pressMain: () => { if (!isCooldown) triggerMainAction(); },
            isOnCooldown: () => isCooldown,
            forceReset: () => { 
                if (cooldownTimer) clearTimeout(cooldownTimer); 
                resetCooldown(); 
            },
            getThemeColor: () => '#56C294',
            getCooldownDuration: () => BUTTON_COOLDOWN_DURATION
        };
        
        console.log(`✅ 纯立体按压按键 | 按压后变暗禁用 ${BUTTON_COOLDOWN_DURATION / 1000}秒，无骰子飞出动画`);
        console.log('🎮 开发者API: window.GameButtonAPI.pressMain() 手动触发按压效果');
        
        // 优雅启动微提示
        setTimeout(() => {
            const container = document.querySelector('.game-demo-container');
            if (container) {
                container.style.transition = 'box-shadow 0.2s';
                container.style.boxShadow = '0 0 0 2px rgba(86,194,148,0.4), 0 25px 40px black';
                setTimeout(() => { container.style.boxShadow = ''; }, 500);
            }
        }, 200);
    })();
</script>
</body>
</html>
