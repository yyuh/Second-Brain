<script>
const container = document.getElementById('network');
const tooltip = document.getElementById('tooltip');

const models = [{"id":"m001","title":"保险公司模式","coreView":"不赌方向，卖风险溢价。","example":"比如你卖一份看跌期权收保费，不赌股价涨跌，只要到期前没暴跌就行。像保险公司收保费，99%的保单不出险，靠概率赚钱。","tags":["期权","卖方策略","风险溢价","被动收入"]},{"id":"m002","title":"无风险基底+杠杆套利","coreView":"所有资金放入SGOV赚4.1%无风险，25%作保证金释放75%购买力做期权卖方。同一笔钱在两个维度赚钱。","example":"比如你有10万全买SGOV赚4.1%，其中2.5万作为保证金卖出期权，剩下7.5万购买力也同时参与。同一笔钱既吃利息又卖期权。","tags":["国债","SGOV","保证金","套利","资金效率"]},{"id":"m003","title":"复合收益思维","coreView":"真正改变财富的不是收益率，而是复利的指数效应。时间的权重大于收益率。","example":"每天进步1%，一年后是1.01³⁶⁵≈37.8倍。不是线性增长，是指数效应——时间越长越恐怖。","tags":["复利","指数增长","长期主义"]},{"id":"m004","title":"财富分层策略","coreView":"不同财富量级的策略完全不同。不要用穷人的方法管富人的钱。","example":"拿月薪5000的人该先学定投攒本金；拿500万的人该考虑资产配置和税务规划。方法完全不一样，拿穷人的理财方法管富人的钱必亏。","tags":["财富量级","策略分层","门槛","适配性"]},{"id":"m005","title":"认知驾驭财富","coreView":"爆发赚钱后认知跟不上是财富流失的根本。先建认知地基，再追求财富增长。","example":"一个拆迁户突然拿到500万，半年后被各种理财骗光——不是钱的问题，是他脑子里没有驾驭500万的认知框架。","tags":["认知","财富心理学","金融素养"]},{"id":"m006","title":"单一路径法则","coreView":"从新手村到成功只有一条路——困难是预设的知识点，绕过等于跳过成长。","example":"想学编程就绕不过掉bug的痛，想健身就绕不过肌肉酸。这些困难不是设计缺陷，是系统自带的必修课。","tags":["人生哲学","困难","成长","必经之路"]},{"id":"m007","title":"困难即礼物","coreView":"挫折是老天给我们的礼物，只是以折磨人的形式特意包装。","example":"被裁员了很痛苦，但回头看可能是逼你转行做正确的事。包装很丑但礼物是真的。","tags":["挫折","礼物","包装","心智成长"]},{"id":"m008","title":"人生RPG模型","coreView":"人生就是一场属于你自己的最完美的RPG游戏。一级一级自己打上来。","example":"你现在的工资是1级，学投资是练技能点，接建材生意任务是支线副本。每一级都是自己打上来的，没人能代打。","tags":["游戏化","自我认知","成长路径","内驱力"]},{"id":"m009","title":"记录递进法则","coreView":"记录把一次性经验变成永久buff。不记录=每次从零开始。","example":"今天学到一个投资策略，记下来。三个月后同样的场景出现，你直接调用策略不用重新想。记录=经验可复用。","tags":["反思","记录","经验复用"]},{"id":"m010","title":"内心字典论","coreView":"冲突的根源是每个人对关键概念的定义不一致。沟通前先对齐定义。","example":"你说'尽快'是今天下班前，对方理解成下周。冲突根源不是谁对谁错，是你们字典里'尽快'的定义不一样。","tags":["沟通","定义","冲突","认知差异"]},{"id":"m011","title":"沉默即力量","coreView":"情绪爆发时第一反应是闭嘴。沉默不是退缩，是最大的力量。","example":"吵架时对方说了难听话，第一反应想回骂——闭嘴十秒。这十秒里的沉默比你回骂的任何一句话都更有力量。","tags":["情绪","沉默","关系","自控"]},{"id":"m012","title":"人性溢价论","coreView":"AI越强大，你越有人性人味，你越值钱。完美贬值，真实升值。","example":"两个AI都能写文案，但你的文案里有你亲身经历的故事、你的方言梗、你的情绪——这些AI写不出来，而用户为这些付费。","tags":["AI","人性","真实","未来价值"]},{"id":"m013","title":"传记寻梦法","coreView":"看传记帮你发现自己想成为谁。传记是镜子。","example":"读了乔布斯传发现你不羡慕他的成功，羡慕他对自己产品的偏执——这比你做10个性格测试更能告诉你该走什么路。","tags":["阅读","传记","梦想","自我认知"]},{"id":"m014","title":"健康七律","coreView":"不求一步到位，求变好。烟→肥胖→久坐→睡眠→盐→糖→压力。","example":"先戒烟，不要同时要求自己每天跑5公里+戒糖+早睡。一步到位是最大的敌人，变好一点就够了。","tags":["健康","生活方式","优先级"]},{"id":"m015","title":"读书四阶论","coreView":"传记→社会运转规律→心理学/人际→搞钱/财富。跳阶无效。","example":"一个没看过几本传记的人直接去读《穷查理宝典》，大概率读不下去——因为认知层级没到。先读名人故事建立兴趣，再看社会运转的规律。","tags":["阅读","成长","路径","层级"]},{"id":"m016","title":"深层扎根法则","coreView":"干旱环境迫使根系深入，困境迫使人深度扎根。机会来临时才能一次性吸收。","example":"疫情期间线下生意全停，被迫学会做抖音获客。后来线下恢复了，抖音反而成为新增长点。干旱让你扎的根在雨季来临时吸收更多水。","tags":["困境","扎根","成长"]},{"id":"m017","title":"考试祛魅论","coreView":"任何一个被视为极其重要的事，其实都不那么重要。看根系不是看树叶。","example":"高考前觉得这是人生分水岭，考完发现没人再问你高考多少分。回头看，真正影响你人生的是你在乎什么、跟谁在一起。","tags":["考试","祛魅","教育"]},{"id":"m018","title":"AI渗透论","coreView":"AI不是一个大方向——它是蒸汽机，渗透所有行业。把AI与你热爱且擅长的领域融合。","example":"就像蒸汽机不只改变了交通——改变了纺织、采矿、农业、战争。现在AI正在渗透医疗、法律、教育、编程。每个行业都会被重新洗一遍。","tags":["AI","渗透","基础设施"]},{"id":"m019","title":"垂直深耕法则","coreView":"不做大而全，做极度垂直。找到垂直需求→做成产品→让用户付钱→再改进。","example":"不要做'帮助中小企业数字化转型'这种大而全的事。做'帮助县城建材店做客户管理'——窄到只有一种用户，但做到极致。","tags":["垂直","专注","产品"]},{"id":"m020","title":"数据主权意识","coreView":"你的数据=你的价值。中心化平台用流量换走你的数据和行为价值。","example":"你用免费App记账，App在背后分析你的消费行为、卖数据给金融机构赚钱。你的数据是你的劳动成果，但你没有分到一分钱。","tags":["数据","主权","个人价值"]},{"id":"m021","title":"反算法生存","coreView":"少刷短视频（多巴胺陷阱）→多做长期分泌内啡肽的事。","example":"刷1小时短视频=多巴胺疯涨后空虚。跑5公里=痛苦15分钟后一整天的充实。前者是消费，后者是投资。","tags":["短视频","内啡肽","延迟满足","心态"]},{"id":"m022","title":"上层建筑决定论（深）","coreView":"上层建筑决定经济基础，不是反过来。创业者要的不是满足需求，而是让自己做的事获得合法权利。","example":"你看一个行业赚钱了想进去，但你没看到这个行业背后的权力结构——谁发了牌照、谁定了标准、谁控制了渠道。这些上层建筑决定了你能不能赚钱。","tags":["权力","制度","创业","合法性","马克思主义翻转"]},{"id":"m023","title":"自我叙事剥离","coreView":"禁用职业/名字/性别/学历/年龄。你究竟是谁？剥离标签才能看清自己。","example":"如果禁用'我是程序员/我是徐州人/我25岁/我大专'这些标签，你是谁？一个喜欢研究事物规律、想用产品影响别人生活的人。","tags":["自我认知","标签","故事"]},{"id":"m024","title":"精细化壁垒","coreView":"下一个时代要么有核心专利，要么做精做透做到极致。做得好自然有人买单。","example":"一个小面馆只做牛肉面，但汤熬24小时、牛肉选特定部位、面条每天现做。周围三家面馆都倒了，它还活着。","tags":["极致","标准","细节","壁垒"]},{"id":"m025","title":"AI军备竞赛不可逆论","coreView":"2026年全球CSP资本支出年增79%，AI算力投入已是生存竞赛。谁停下谁出局。","example":"2026年谷歌微软亚马逊在AI算力上投入3000亿美元。你作为创业者不需要跟，但必须知道你服务的每个行业都在被AI重写。","tags":["AI","算力","军备竞赛","资本支出"]},{"id":"m026","title":"硬件结构性通胀论","coreView":"半导体全产业链涨价是AI需求+地缘政治+供给偏紧三重叠加的结构性通胀。","example":"英伟达H100从3万涨到4万多，不是厂商黑心，是AI需求爆炸+中美芯片战+台积电产能满三件事一起推高价格。","tags":["通胀","半导体","供应链","地缘政治"]},{"id":"m027","title":"太空经济临界点论","coreView":"SpaceX 750亿美元IPO标志太空经济从概念验证进入资本化阶段。","example":"以前太空只是国家和科幻片的事。SpaceX准备IPO了，意味着普通人也可以通过股票投资太空经济——门槛从几十亿降到几千块。","tags":["太空","SpaceX","IPO","资本化"]},{"id":"m028","title":"亏损即壁垒论","coreView":"战略性亏损本身就是最深的护城河——你亏得起70亿/季建基础设施，追赶者连7亿都拿不出来。","example":"OpenAI每季度亏70亿美元建AI基础设施。听起来很恐怖，但追赶者连7亿都拿不出来——亏损反而成了最深的护城河。","tags":["亏损","AI","护城河","基础设施"]},{"id":"m029","title":"机器人临界点论","coreView":"多个信号同时出现：AI模型+硬件制造+政策支持三要素首次同时成熟。","example":"特斯拉Optimus、Figure 02、宇树科技的人形机器人同时量产——AI大脑成熟+中国供应链便宜+各国政策开放，三个条件首次同时满足。","tags":["人形机器人","具身智能","临界点"]},{"id":"m030","title":"地缘溢价常态化论","coreView":"地缘紧张不再是偶发黑天鹅，而是GDP的永久挂件。投资者必须学会在常态化地缘溢价下定价。","example":"中美芯片战导致芯片价格永久性上涨了。以前是'政治问题'，现在是'做生意的常态成本'。投资任何和芯片有关的行业都要算这个溢价。","tags":["地缘政治","风险溢价","供应链","避险"]},{"id":"m031","title":"半导体国产替代第二阶段论","coreView":"中国半导体正从「补短板」进入「建长板」阶段，关键在于方向选择而非产能规模。","example":"以前中国半导体在追赶光刻机，现在有企业直接做Chiplet架构——不是跟在后面补短板，是换个赛道建长板。","tags":["半导体","自主可控","差异化"]},{"id":"m032","title":"AI物理世界渗透加速论","coreView":"2026年6月AI渗透论从「将渗透」升级为「正在渗透」——方向盘、操作系统、机器关节。","example":"以前说AI是软件，现在AI已经在控制自动驾驶的方向盘、工厂的机器人关节、手机的底层操作系统。从'将渗透'变成'正在渗透'。","tags":["AI","端侧","操作系统","自动驾驶","渗透"]},{"id":"m033","title":"认知产品论","coreView":"任何领域的终极产品不是工具本身，而是工具背后那个人的认知沉淀。四个表面不同的产品本质统一：认知传递。","example":"财富自由棋、智者、第二大脑、小伴——四个产品看似不同，本质都是'把泰明的认知沉淀变成可交付的产品'。终极产品是认知本身。","tags":["认知传递","产品哲学","个人IP","垂直深耕","长期主义"]},{"id":"m034","title":"行动即认知论","coreView":"行动本身就是认知的表现。认知低的人不会行动，还觉得自己认知很高。「我懂了但还没做」=没懂。","example":"'我懂理财，就是还没开始定投'——不，你没懂。真正懂的人会在发工资那天自动转钱到定投账户，根本不需要'下决心'。","tags":["认知","行动","空想主义","执行力","自欺"]},{"id":"m035","title":"AI组织重构论","coreView":"AI替代的不是岗位，是角色类型。组织三种人：建造者（用AI搭东西）、销售者（懂人性卖价值）、衡量者（做报表算数字）。AI替代衡量者。裁20%同时招人创新高=人力结构重配，不是缩编。","example":"公司裁了20%做报表的人，同时招了10%用AI搭产品和懂人性卖价值的人。不是裁员，是在换血——换掉可替代的角色，保留不可替代的。","tags":["AI","组织","裁员","人力结构","角色分类","职业安全"]},{"id":"m036","title":"品牌飞轮五步论","coreView":"个人品牌增长自驱飞轮：起名占位→渠道预埋→Build in Public→社群共创→口碑裂变。五个齿轮环环相扣，启动后互相加速。","example":"你在小红书上起号叫'县城青年投资日记'→在知乎预埋理财内容→边学边公开实盘→建群讨论→群友分享裂变。五个齿轮互相加速。","tags":["个人品牌","增长飞轮","Build in Public","社群","产品营销"]},{"id":"m037","title":"赢过记忆陷阱论","coreView":"","example":"一个人合约交易赚了100万，三个月后心态崩了辞职，半年后钱快赔完——他的第一反应不是找工作，是再开一单。赢过的记忆像毒瘾。","tags":["认知偏差","投机心理","赌徒谬误","风险"]},{"id":"m038","title":"思想实验锚定法","coreView":"","example":"看了十篇'不要杠杆'的文章没感觉。但让你闭眼想象：你借钱满仓买了热门币，一天跌50%，爆仓后欠债50万，信用卡到期、房东催租——这个思想实验比十篇文章都管用。","tags":["教育","行为改变","决策","心理锚点"]},{"id":"m039","title":"Agent外壳决定论","coreView":"同一个大模型+不同Agent外壳=完全不同的用户体验。外壳比模型本身更影响实际体验。","example":"同样用GPT-4，Microsoft Copilot帮你写文档、Cursor帮你写代码、Character.AI陪你聊天——模型相同但外壳不同，体验天差地别。","tags":["AI","Agent","大模型","工具链","架构"]},{"id":"m040","title":"双核协奏原理","coreView":"Claude Code（架构/攻坚）+Codex（执行/审查）=黄金搭档。多模型交叉验证提升可靠性。","example":"写一个复杂功能，先用Claude Code设计架构和写核心逻辑，再用Codex跑测试和审查代码。两个模型交叉验证，bug检出率翻倍。","tags":["AI工具","协作","交叉验证","编程","效率"]},{"id":"m041","title":"软件进化论","coreView":"Cursor既是编程软件又是智能体——软件正从'工具'进化为'协作者'。二分法思维会错过本质变化。","example":"最初Excel是电子表格工具，现在Excel有Python集成、能做数据分析和自动化——它从'工具'变成了'数据工作台'。软件在进化。","tags":["工具进化","AI原生","软件边界","智能体"]},{"id":"m042","title":"第一性原理回归论","coreView":"任何问题的答案都在它最底层的前提假设里。剥洋葱式追问‘这个说法的前提站得住脚吗？’直到触及不可再分的根基，再从根基重建。","example":"有人说'定投年化8%'。追问：8%是怎么算出来的？长期回测还是理论模型？回撤多少？前提假设是什么？剥到最底层才能判断靠不靠谱。","tags":["第一性原理","认知方法","拆解思维"]},{"id":"m043","title":"自组织进化论","coreView":"最好的结构不是设计出来的，是从底部生长出来的。自上而下的控制永远低于自下而上的生命力。‘不要做公路上的车，要做公路’。","example":"微信不是腾讯顶层设计出来的，是广州团队根据用户需求不断迭代长出来的。最好的产品像野草，不是盆景。","tags":["自组织","去中心化","生长式架构"]},{"id":"m044","title":"本质主义者工具箱","coreView":"95%的事情不重要。找到那5%然后all in。用前提问法缩小到本质，用‘如果这是我生命的最后一年’测试优先级。","example":"计划学10个技能：编程/投资/写作/英语/健身/摄影/烹饪/剪辑/营销/管理。95%没用。找到其中那最重要的5%——可能是编程和营销——然后半年只做这两件。","tags":["优先级","聚焦","减法思维"]},{"id":"m045","title":"觉醒者悖论","coreView":"当你自以为已经觉醒时，你是最沉睡的。真正的觉醒是一个永远不会到达的状态。警惕任何一个‘我懂了’的瞬间——那可能是最大的懂错。","example":"当你觉得自己'已经开悟了、看透了'的时候，恰恰是你最沉睡的时候。真正的认知提升是一个永远不会到达终点的旅程。","tags":["反身性","认知谦逊","成长心态"]},{"id":"m046","title":"认识你自己本质论","coreView":"所有问题的本质——焦虑、迷茫、意义缺失——都源于不认识自己。解剖痛苦而非缓解痛苦，剥离标签而非添加标签。","example":"你总焦虑'不知道做什么'。别急着找方向，先问：你为什么焦虑？是怕落后还是怕选错？怕落后就安心深耕一个方向，怕选错就想清楚你到底要什么。认识问题才能解决问题。","tags":["自我认知","存在主义","内在探索"]},{"id":"m047","title":"权力演变驱动论","coreView":"任何科技革命本质上是权力演变。AI和芯片正在诞生新的权力结构。创业者不要只满足需求，要在权力演变中找到言说权利和数据资产。","example":"AI出现后，谁掌握数据、谁定义标准、谁训练模型，谁就掌握新的权力。创业者不要只盯着功能需求，要看这个产品在权力演变中占据什么生态位。","tags":["权力","科技革命","创业","数据主权","信息"]},{"id":"m048","title":"障碍绕路智慧","coreView":"有些障碍不可突破，硬闯不是智慧。智慧是识别可突破和不可突破的能力。面对不可突破的障碍，绕路不是认输——先回到起点，看看路还在不在、成本还在不在。","example":"你试图说服一个固执的同事接受你的方案，越说越僵。不是方案不好，是这个人在这个议题上不可突破。绕路——找他的上级或换一个合作通道。","tags":["困难","智慧","路径选择","韧性"]},{"id":"m049","title":"群体分布套利","coreView":"对1亿人群发，一半说A赢一半说B赢。你不需要预测单场比赛——只要每轮有一半人收到正确预测，十轮后总有几千人看到十连中。个体不可预测，群体分布可精准控制。","example":"你运营一个股票分析号，对100万人群发：一半人收到'明天涨'、一半收'明天跌'。第二天涨了，给收到'涨'的那50万人再分两半继续。10轮后总有几百人看到你'十连中'——他们会付费买你的'下一期预测'。","tags":["概率","博弈","仓位管理","认知差"]},{"id":"m050","title":"运气均值回归论","coreView":"运气在时间线上服从均值回归。短期密集倒霉=好运快来了。短期密集好运=倒霉事在路上。顺时不飘，逆时不慌。这不是鸡汤，是群体概率在个体时间线上的映射。","example":"一个月内连续碰上车胎爆了、手机摔了、被扣工资——不是因为你倒霉，是随机波动在短期内的正常聚簇。不要慌，好运在路上了。反过来，连续中签三个新股，反而要小心。","tags":["运气","概率","心态","风险感知"]},{"id":"m051","title":"反直觉信号识别","coreView":"真随机数据必然出现反直觉的连续模式（连续5-6次正面是必然事件），但人编造的数据会避免连续。直觉认为不对的往往是真实的，认为合理的反而是编造的。","example":"抛硬币100次，如果真实随机，必然出现连续5-6次正面。但如果是人编造的数据，他会刻意避免这种'不合理'的连续。反常即真实。","tags":["概率","直觉偏差","信号检测","认知"]},{"id":"m052","title":"疗愈放下论","coreView":"不需要原谅任何人。真实的疗愈不是原谅，是放下——不再期待对方改变。你可以不原谅，也可以让自己过得很好，这两件事不矛盾。内心的小孩需要的不是坚强，是有人在说我在。","example":"你恨父亲从小不管家。心理医生没让你原谅他，而是让你接受'他就是那样的人，不会改变了'。放下的那一刻，不是原谅了对方，是放过了自己。","tags":["心理学","原生家庭","情绪","自我疗愈"]},{"id":"m053","title":"具体内容优势论","coreView":"AI和博主都在讲大环境大趋势时，红利在反方向——讲你身边的事、具体的经历、真实的挫折。越具体越有力量，越真诚越不可替代。AI知道所有宏观数据，但只有你有那个具体故事。","example":"所有自媒体都在讲'2026年AI趋势'，你写'我用AI帮县城建材店做了一个月业绩翻倍的客户管理表'——具体到你跟哪家店、什么表格、怎么翻倍的。越具体越不可替代。","tags":["内容","创作","差异化","AI时代"]},{"id":"m054","title":"职业基本功论","coreView":"找不到更好工作时，把眼前工作做好。每天八小时不玩手机、打扫干净、对客户用心。规范不是为了假装努力，而是在迷茫期维持职业状态——状态的底线不能破。","example":"找不到程序员工作，先在厂里好好上班。每天把工位擦干净、不摸鱼、对客户耐心点。不是为了感动老板，是为了在低谷期维持'我还在认真活'的状态。","tags":["职场","职业发展","基本功","行动"]},{"id":"m055","title":"自我博弈论","coreView":"年轻人绝大部分问题的根源是每天在和自己内心那个想偷懒的自己打架。外人的困难拼一拼有机会赢。但输给自己——这辈子都赢不回来。真正的对手从来都不是别人，是每一个想偷懒、想放弃、想认命的自己。","example":"早上闹钟响了想再睡10分钟，心里那个'偷懒的我'赢了。晚上计划学习，手不自觉地打开抖音。你输给的从来不是外界，是每天的自己。","tags":["自我成长","自律","行动力","内耗"]},{"id":"m056","title":"信任立身论","coreView":"你一辈子最值钱的不是存款，是别人对你的信任。为蝇头小利失信是最不划算的买卖。信任建立需要十年，毁掉只需要十秒。一个人一旦失信一次，这个社会就完了。","example":"你在建材市场卖货，有客户来问价格，说实话报最低价。他不会每家都问，下次直接来找你。三年后他遇到大项目第一个想到你。一个信任值30万。","tags":["社会关系","信任","信誉","价值观"]},{"id":"m057","title":"恶语潜意识论","coreView":"说出口的恶毒话不是你气头上说的——那些话已经在你潜意识里内化了，只不过在你理智失控时暴露出来。嘴是用来表达爱的，不是用来发泄情绪的。可以讲道理，不要恶语相向。","example":"吵架时脱口而出的那句'你从来都不管我们'——不是气话，是你心里早就这么想了，只不过平时没说出来。嘴上的狠话是心里早就写好的草稿。","tags":["沟通","心理","情绪管理","人际关系"]},{"id":"m058","title":"热情死磕论","coreView":"找到你愿意做一辈子的那件事情，爱如刀死磕到底。五年换八个行业的结果是什么都不精。热情不是找到喜欢的事，是找到愿意为它吃苦的事。不是找最赚钱的事，是找最愿意做一辈子的事。","example":"比起月薪2万的互联网大厂工作，你更愿意每天干10小时研究投资策略。热情就是你愿意为它吃苦的那件事，不是最赚钱的那件。","tags":["职业","专注","热情","长期主义"]},{"id":"m059","title":"极限心牢论","coreView":"所有所谓的极限都是你自己内心化的一个牢笼。成功都发生在所有人认为不可能的时候。极限不是真实存在的边界线，是想象力画给自己的封锁线。信命=接受极限=停止奔跑。","example":"很多人都觉得县城出身的人不可能靠AI产品赚钱。但你不能这么想——你的极限是你自己画的线，不是别人画的。","tags":["自我设限","信念","突破","认知"]},{"id":"m060","title":"感恩清醒论","coreView":"感恩不是迷信，是对你此时此刻还活着、还能呼吸、还能吃饭的清醒认知。这些不是平白无故来的，不是理所应当的。感恩的核心不是觉得自己幸运，而是不把任何东西当作理所当然。","example":"今天的饭菜是你想吃的、有手机能发微信、身体健康能跑步——这些不是理所当然的。意识到这一点不是鸡汤，是对'我凭什么拥有这些'的清醒。","tags":["感恩","正念","心理健康","人生观"]},{"id":"m061","title":"希望奔跑论","coreView":"希望不是我相信我一定能赢，是我不知道结果，所以我还在奔跑。放弃从来不发生在没有希望的那一刻——放弃发生在你决定没有希望了的那一刻。希望不是一种客观状态，是一种主观操作。","example":"创业者不知道能不能做成，但每天还在做。他不是因为相信一定能赢才跑的，而是因为没决定放弃所以还在跑。","tags":["希望","行动","韧性","心态"]},{"id":"m062","title":"没有永远论","coreView":"永远没有永远这个词。正因为没有永远，所以每一秒都珍惜。想做现在就去做，想见的人现在就去见。早做不是快——早做，然后持续很长一段时间，甚至是一辈子，才知道什么是幸福。","example":"想念朋友就马上约饭，想学编程就从今天开始。别等'等我有时间'——永远没有那个时候。早做不是做得快，是早到能积累成一辈子的事。","tags":["时间","珍惜","行动","存在主义"]},{"id":"m063","title":"恶的编制化论","coreView":"金翅大鹏吃人，如来的解决方案不是灭了他，是给编制——\"你先吃，吃完佛和福再来吃\"。这不是妥协，是把恶纳入系统。巨贪进去了，但贪腐的玩法被系统吸收为\"潜规则\"。恶不消失，只是被制度化。你问为什么孙悟空绝望？他不是打不过，是他打的是一个谁都动不了的人——金翅大鹏是如来的亲戚，整个天庭系统没人会帮你真的办他。就像你在公司发现一把手的小舅子贪了几千万，你告到哪去？","example":"公司里发现领导亲戚吃回扣，你去举报——人事说会调查，三个月没消息。不是不处理，是这个'编制'里没人会动他。恶被系统化了。","tags":["权力","制度","恶","系统性"]},{"id":"m064","title":"苦难分岔路论","coreView":"同样经历了非人的苦难，勾践卧薪尝胆后变成了魔鬼（杀文种、兔死狗烹），孙悟空被压五百年后心里那盏灯还亮着。区别在哪？勾践的苦难有目的——灭吴。目标达成了，苦难白受了，人废了。孙悟空的苦难没有\"目标\"，它就是经历本身。所以苦难结束后，他还是他。修行不是没见过恶，是见过恶之后依然选择向善。","example":"A被裁员后花了3年从零转行做设计，现在很开心。B被裁员后一直想着'凭什么裁我'，3年后还在原地抱怨。同样的挫折，有没有把它当作工具决定了结局。","tags":["苦难","成长","目的","人性"]},{"id":"m065","title":"双标底层逻辑论","coreView":"如来批评南赡部洲多贪多杀，说犀牛贺州岁岁享安康。但狮驼岭就在犀牛贺州——如来自己的地盘上，这里是人间地狱。这层最狠：如来嘴里的\"理想国\"在自己地盘上就是最烂的地方，他还好意思拿唐僧的大唐当反面教材。美国天天说别人没人权，自己关塔那摩往里塞人。中国古人就玩明白了。这不是\"说一套做一套\"，这是一种管理技术——权力永远有一个叙事前台和一个肮脏后台，前台给外人看，后台才是自己人。","example":"老板在年会上说'公司是大家庭，大家都是兄弟姐妹'，私下对核心层说'这几个人该裁了，别让他们知道'。一个前台给所有人看，一个后台才是自己人。","tags":["权力","双标","话语权","现实"]},{"id":"m066","title":"懦的伪装论","coreView":"\"我纠结\"（不说我还没行动），\"我想创业\"（不说我什么都没看），\"我有孩子要养\"（拿家人当盾牌）。大刀一眼看穿：这不是在求助，是在博同情。他想让直播间替他做决策、替他承担风险。他说\"谁他妈敢在我直播间感情叙事\"——本质上是在说：你的困境我同情，但你的行动我不替你做。","example":"'我好想辞职创业，但孩子要养'——真实情况是什么调研都没做。用家人当盾牌，本质是不敢承把自己放在风险面前。","tags":["行动","借口","决策","责任"]},{"id":"m067","title":"调研取代决策论","coreView":"大刀不说\"建议你去看看\"，他说\"花八个月，把你周边一百五十公里的夜市全看一遍\"。这是两种思维的区别：普通人的反应——帮你分析卖什么好；大刀的反应——逼你自己找答案。调研不是建议，是命令。狠，但有效。调研是最便宜的学费——花几万块试错之前，先花几十块钱去看。","example":"想开奶茶店别先问'什么品牌好'。花八个月把周边150公里的夜市全走一遍，看哪些品类排队、什么价位能走量、什么位置没收。调研是最便宜的学费。","tags":["调研","行动","试错","决策"]},{"id":"m068","title":"苦的类型学论","coreView":"大部分人能吃重复的苦，但吃不了花一年学技能的苦。一个人在电子厂干十年每天12小时他能忍，但你让他花一年不赚钱去学门手艺他疯了一样焦虑。因为重复的苦是确定的（我知道每天会干什么），学技能的苦是不确定的（学了一年能赚钱吗？）。不确定的苦比确定的苦难吃一百倍，但前者让你原地踏步，后者才是翻身的路。","example":"在厂里一天12小时做同一个动作做了五年，他能忍。但让他花一年不上班去学编程，他焦虑得睡不着。重复的苦确定所以能吃，进步的苦不确定所以不敢吃。","tags":["苦难","选择","成长","勇气"]},{"id":"m069","title":"恶与懦一体两面论","coreView":"狮驼岭讲的是头顶的恶——制度化的、有编制的、你动不了的恶。大刀流讲的是脚下的懦——不敢行动的、拿借口当盾牌的、依赖别人做决定的懦。这是同一枚硬币的两面。你看懂了上面那些恶，最自然的反应是\"算了吧\"——孙悟空都差点放弃了。但大刀告诉你：别找借口，别感情叙事，去看、去走、去试。你不是孙悟空，用不着斗战胜佛，但别当巨婴。","example":"孙悟空发现狮驼岭妖怪是如来亲戚时差点放弃——上面有编制化的恶。但你不一样，你不是孙悟空，不要用'上面有人动不了'当自己不行动的借口。","tags":["认知","行动","整合","统合"]},{"id":"m070","title":"成功双因子论","coreView":"任何一个人的成功与一个企业的成功，底层公式相同：**成功 = 不公平竞争优势 × 执行闭环**。不公平竞争优势是钱、地位、权力、天赋（只有你能干别人干不了的）、人脉连接的加权综合值。执行闭环是 Think→Do→Check→Adjust 的循环速度——想到一个东西就落地、看数据、分析、改、再落地。核心不是开了多少会，是跑了多少圈。一天跑3圈×20工作日=60圈/月。两个因素缺一不可，任何一方为零，","example":"你认识县里所有建材店老板（不公平优势）×你每月跑一遍更新分类台账（执行闭环）。两个都做到，结果不会是零。缺任何一个，结果就是零。","tags":["成功","执行力","竞争优势","认知"]},{"id":"m071","title":"身份先行论","coreView":"人的行为是被自我身份决定的，不是你成功了你才是什么人，而是你先认定自己是什么人，才会做出与之匹配的行为。身份像一个滤镜——你觉得自己是\"创业者\"，就会做出创业者该做的选择；你觉得是\"受害者\"，行为也会往那个方向滑。想改变行为，最底层的杠杆不是定目标、列计划，而是先换身份。真正的转折点跟坚持多少无关，跟你是谁有关。","example":"别跟自己说'我要学会投资'。先告诉自己'我是一个投资者'。身份变了行为会自动跟上——投资者会看财报、会算风险、会坚持定投。改行为先改身份。","tags":["身份","行为","成长","认知"]},{"id":"m072","title":"反愿景锚定法","coreView":"人对失去的痛苦远大于得到的快乐（损失厌恶）。最务实的成长动力不是\"我想要什么\"，而是\"我绝对不想变成什么\"。把五年后最糟糕的自己——还在原地打转、一事无成、身体垮了、关系崩了——事无巨细地写下来，这个画面会比你任何梦想都尖锐。它不是焦虑，是警报。每天看一眼，倒逼你从自动驾驶模式里醒过来。恐惧不是绊脚石，是告诉你什么重要——害怕失败说明你在意结果、害怕失去说明这个对你很重要。","example":"把五年后最不想变成的自己写下来：还在做基础测试、月薪4000没变、没有任何副业、身体发福。把这个画面贴在电脑边上。每天看一遍比任何励志语录都管用。","tags":["恐惧","动机","行动","认知"]},{"id":"m073","title":"分步验证策略","coreView":"先验证需求再全力投入。条件不够就先做广告版测试需求，等数据验证后再做完整版。最小成本验证，条件不够就只做广告版。","example":"想做一个付费理财课程，先别录20节。先做一页广告页放出去，看有没有人点击咨询。有人问再做第一节测试课。没人问这个需求根本不存在。","tags":["创业","验证","MVP","迭代"]},{"id":"m074","title":"两种金钱逻辑","coreView":"花预算的人按年度规划花钱，做投资的人按回报率花钱。创业者的钱只有投资属性没有预算属性。分不清花预算和做投资，是认知不到位。","example":"花2万学一门AI课程——这是花预算（花完就没了）。花2万买一个域名和服务器做一个AI产品——这是投资（有机会赚回来）。同一个金额，性质完全不同。","tags":["创业","预算","投资","思维方式"]},{"id":"m075","title":"轻量化角色融合","coreView":"单Agent加系统提示词等于多角色架构。用系统提示词实现角色切换和融合，不依赖多Agent复杂架构。","example":"做智者产品不需要搭三个不同的Agent（投资人/教练/讲者）。一个Agent加不同的系统提示词就能在三种角色间切换。轻量融合，不要重型架构。","tags":["AI","产品设计","角色","架构"]},{"id":"m076","title":"预训练加服务化","coreView":"将AI能力拆分为训练阶段和服务阶段。提前用30到50组数据训练风格引擎，然后封装成简单API服务。架构分离了重训练和轻调用。","example":"训练一个'泰明写作风格'模型：先喂30篇你的文章做风格学习，然后封装成一个API。写日常回复时调这个API，不用每次都从头调大模型。","tags":["AI","产品","架构","效率"]},{"id":"m077","title":"渐近极限法","coreView":"先算物理定律允许的理论最优值，再问现实为什么离这个值这么远。白痴指数等于成品价格除以原材料成本，指数越高说明制造浪费越大。从理论值出发重新设计而非从现有方案改进。","example":"SpaceX的火箭成本是传统航商的1/10。为什么？马斯克先算：制造火箭的材料成本大约占售价的2%（白痴指数=50）。从物理极限出发重新设计制造流程，不是从现有方案改进。","tags":["第一性原理","成本拆解","物理思维","创新方法","埃隆·马斯克"]},{"id":"m078","title":"五步算法","coreView":"先质疑需求是否该存在，再删除多余的，然后才优化，最后才加速和自动化。顺序不可颠倒。优化一个不该存在的东西，是最常见的工程错误。","example":"发现团队在优化一个报表生成流程——先问这个报表真的需要吗？删掉它。删除不了的才优化，优化不了的才加速。用前三步替代'直接上自动化'。","tags":["流程优化","减法思维","系统设计","工程管理","埃隆·马斯克"]},{"id":"m079","title":"存在主义锚定","coreView":"一切决策锚定在人类文明存续这个尺度上看。小问题变成大使命，小失败变成可接受的代价。评估项目是否值得长期投入，如果在文明尺度上有意义，短期失败可以接受。","example":"做特斯拉不是因为电动车能赚钱，是因为人类需要可持续能源来避免文明毁灭。从这个视角看，亏十年的钱也值得投。","tags":["使命驱动","长期主义","决策框架","文明视角","埃隆·马斯克"]},{"id":"m080","title":"垂直整合即物理必然","coreView":"白痴指数高意味着供应链每一层在收信息不透明税。垂直整合不是商业策略偏好，是降低白痴指数的物理必然。先问这个价格中有多少是供应链溢价，差距大于5倍就该考虑垂直整合。","example":"电池组成本中30%是中间商和供应链的溢价。特斯拉自己造电池工厂，不是扩张业务，是物理必然——因为白痴指数告诉他们，中间商在收信息不透明税。","tags":["成本策略","供应链","垂直整合","效率","埃隆·马斯克"]},{"id":"m081","title":"快速迭代大于完美计划","coreView":"把激进时间线当管理工具制造紧迫感，接受大量失败作为加速学习的代价。面对不确定性高的新领域，用先做一个会失败的版本从失败中学，替代先做详细计划确保不失败。","example":"SpaceX做星舰时说计划2年登月——没人信。但激进时间线让团队不去磨完美方案，而是快速试错迭代。失败得越快，学得越快。","tags":["迭代思维","失败学习","行动优先","工程文化","埃隆·马斯克"]},{"id":"m082","title":"多元思维模型","coreView":"从多个学科提取核心模型编织成网状决策框架。遇到任何问题至少从3个学科视角审视。心理学研究人的行为动机，经济学研究激励结构，物理数学研究系统动力学。单一学科必导致系统性盲区。","example":"分析一个公司值不值得投资：用心理学看创始人动机、用经济学看商业模式、用物理学看系统韧性。只看财报是单维度盲人摸象。","tags":["跨学科","决策框架","认知工具","系统思维","查理·芒格"]},{"id":"m083","title":"逆向思考","coreView":"正面解决不了的问题反过来想。不问如何成功，问如何确保失败然后避开。先消灭确定会亏钱的事，剩下的就是好选择。","example":"不确定该不该买某只股票时，不问'它涨的理由是什么'，问'它跌的理由是什么'。把所有会亏钱的情况列出来——能接受的买，不能的就不买。","tags":["逆向思维","风险规避","决策方法","防御思维","查理·芒格"]},{"id":"m084","title":"Lollapalooza效应","coreView":"多种心理偏误同时发力相互强化，产生极端的非线性结果。当事情迅速升温时问自己这里有几种偏误在同时作用。社会认同加过度乐观加被剥夺超级反应等于Lollapalooza，极度危险。","example":"比特币涨到10万时，社会认同（大家都在买）+过度乐观（'这次不一样'）+错失恐惧（再不买就晚了）=Lollapalooza。三种偏误互相放大，极其危险。","tags":["认知偏误","系统性风险","心理模型","泡沫识别","查理·芒格"]},{"id":"m085","title":"能力圈加意见资格制","coreView":"知道自己不知道什么比知道什么更重要。持有意见需要赚到资格。在发表观点前先检验能否比反对者更好地论证他们的立场。不能就闭嘴。把问题分三筐能判断的不能判断的太复杂放弃的。","example":"你只在县城建材和入门投资两个领域有资格发表意见。别在别人问AI未来趋势时滔滔不绝——先检验能不能站在反对者立场把他们的观点讲得更好。","tags":["认知边界","谦逊","纪律","判断力","查理·芒格"]},{"id":"m086","title":"激励机制决定一切","coreView":"想理解任何人的行为先看他的激励结构。不要听他说什么看他被什么奖励。理解行为的关键在激励不在人品。设计制度时先问这个激励机制会诱导什么行为。","example":"客户经理天天打电话推销理财产品，不是因为他热心——是因为他的KPI是卖出多少产品。想理解行为，先看激励。","tags":["人性","行为分析","激励设计","洞察","查理·芒格"]},{"id":"m087","title":"矛盾分析法","coreView":"任何复杂局面都可以拆解为若干对矛盾。找到主要矛盾和矛盾的主要方面，一切迎刃而解。四步法：列出所有矛盾、标注力量对比、找出主要矛盾、定位矛盾主要方面。","example":"你创业遇到三个问题：没流量、产品不够好、团队人不够。分析矛盾：没流量是主要矛盾。其中流量矛盾的主要方面是获客渠道单一。解决这个其他问题都会缓解。","tags":["分析","决策","复杂性","矛盾","毛泽东"]},{"id":"m088","title":"实践认识论","coreView":"认识来自实践，回到实践接受检验。没有调查就没有发言权。先调研再研判后决策。当理论和现实冲突时，永远相信现实，用现实修正理论。","example":"别花三个月研究'什么投资策略最好'。先拿500块实战一次，亏了再总结。调查不是在书本里，在实践里。","tags":["认知方法","知行合一","调研","实事求是","毛泽东"]},{"id":"m089","title":"强弱转化非对称博弈","coreView":"弱者战胜强者的唯一方法是不在强者的优势战场与其对抗。改变战场规则或时间尺度。承认弱势并以之为分析起点，设计不对称策略。空间换时间。","example":"一个县城小店打不过美团。不要跟美团比流量（它的战场），做美团做不了的——本地上门修电脑、老年人智能手机教学。换战场，承认弱势才有不对称策略。","tags":["博弈","策略","弱势取胜","非对称","毛泽东"]},{"id":"m090","title":"持久战框架","coreView":"重大斗争不是一次性胜负，是分阶段的长期过程。战略防御到战略相持到战略反攻。不追求速胜，把大问题分解为时序阶段，认清每个阶段的任务。","example":"做AI产品不要想三个月做到100万用户。第一阶段（战略防御）：做一个最小版本验证需求。第二阶段（相持）：收第一批付费用户打磨产品。第三阶段（反攻）：推广裂变。不追求速胜。","tags":["长期主义","阶段性","战略","周期","毛泽东"]},{"id":"m091","title":"人民战争利益绑定","coreView":"最可持续的力量是让最广大人民群众的利益与你一致。设计制度或产品时先问谁会从中受益。利益绑定是比意识形态更强的粘合剂。","example":"你做财富自由棋，谁的利益最大？用户学会了理财不踩坑。所以游戏免费、做得好用户会主动分享给朋友——利益一致时，用户就是你的推广员。","tags":["动员","利益一致","共识","群众","毛泽东"]},{"id":"m092","title":"实事求是","coreView":"一切从实际出发，理论联系实际。真相不在书本里在现实里。面对任何主张先问事实支撑在哪。当理论和现实冲突时修正理论不扭曲现实。","example":"你做了3个月小程序效果不好。别硬套原来的框架，去看数据：用户在哪一步流失了。现实比你的假设更真实。修正理论，不要扭曲数据。","tags":["实践","现实导向","求真","反教条","毛泽东"]},{"id":"m093","title":"概率投资观（投资游戏匹配论）","coreView":"在概率的世界中，每个投资者都能找到适合自己的游戏。投资不是预测游戏，是概率优化游戏——不需要确定性，只需要在概率上长期获胜。投资者的核心任务不是预测市场涨跌，而是找到与自己的认知水平、风险偏好、时间尺度、情绪耐受度高度匹配的那套策略。不同的投资者看同一组数据可以选中完全不同的策略，两者都可以是对的——前提是他们选对了自己的游戏。","example":"有人喜欢高频交易赚小钱，有人喜欢定投等十年。没有哪种更好，只看哪个更适合你的性格和时间——找到自己的游戏比玩好别人的游戏重要一百倍。","tags":["投资哲学","概率","心理适配","有知有行"]},{"id":"m094","title":"配角资产价值论","coreView":"在没有哪一类资产能独自承包100%安全感的当下，重新审视配角资产的价值。一种资产的配置价值不取决于它的绝对收益率高低，而取决于它在组合中扮演的角色。债券在低利率时代仍然有配置价值，不是因为票息高，而是因为它能平滑组合波动、在极端市场行情中提供负相关保护。只看收益率排名来选择资产，是一种典型的认知陷阱——忽视了资产在组合里的结构价值。","example":"别问债券一年赚多少，问它在组合里扮演什么角色。就像足球队里的后卫——进球不多，但没他前面的人不敢往前冲。债券在暴跌时的表现就是那个后卫。","tags":["资产配置","债券","组合管理","风险分散","有知有行"]},{"id":"m095","title":"需求匹配优先论","coreView":"不要问哪种产品好，先问你的需求是什么。每个金融产品都有其设计目的——流动性管理、收益增长、风险保障——好坏不取决于产品本身，而取决于它的特性是否与你的具体目标匹配。选错产品的根源不是买了一个坏产品，而是买了一个好产品但不适合自己。投资和保险决策前，先画出资金用途的时间线和风险容忍度，再选择匹配的产品类型。","example":"先问这笔钱5年内要用吗？要用→买货币基金。10年内不用→可以买指数基金。选产品之前先给钱画时间线，不是上来就比收益率。","tags":["理财","保险","产品选择","需求分析","有知有行"]},{"id":"m096","title":"边界即尊重论","coreView":"爱是爱，边界是边界。在关系里提前谈钱、谈财产安排、谈风险预案，不是物化关系或不够浪漫，而是对关系的真正尊重。让关系变糟的从来不是提前商量好现实问题，而是事到临头才发现彼此从来没聊过。这代人更在意边界、独立和风险——希望在关系里不丢掉自己。边界不是信任的反面，信任越重要，越需要把边界说清楚。","example":"结婚前坐下来聊：双方各自财产怎么管、如果离婚怎么分、一方失业怎么办。不聊这些不是信任，是逃避。聊清楚了才是对关系的尊重。","tags":["关系","边界","婚姻","沟通","有知有行"]},{"id":"m097","title":"削峰填谷权重逻辑","coreView":"追涨杀跌还是削峰填谷，看进出不如看权重。判断一次调仓是理性再平衡还是情绪化追涨杀跌，不看出手的时间点，看背后的权重分配逻辑。如果仓位调整是基于系统规则的机械再平衡——涨多了自然减配、跌多了自然补仓——那么外部看起来的\"高点买入、低点卖出\"行为，本质上是削峰填谷。同一个动作在不同的决策框架下性质完全不同。","example":"你看一个人在股票涨的时候卖掉了一半。别急着说'他在追涨'——如果他是按照'仓位超过目标比例就减仓'的规则操作的，这就是理性再平衡。同一个动作，背后的逻辑决定了它好坏。","tags":["投资操作","再平衡","决策判断","有知有行"]},{"id":"m098","title":"标尺与判断二元论","coreView":"新规明确了边界和标尺，但你仍是最后一道风控。监管、规则、制度只能提供更清晰的标尺——告诉你什么是合法的框架，什么是不该触碰的红线——但永远不能替代你的投资判断。没有任何制度设计能完全替你堵住所有决策坑。最终决定是否买入、是否持有、是否卖出的那个人，永远是你自己。规则是护栏，但方向盘始终在你手上。","example":"证监会出了新规说某某产品不能卖给你。但这不是替你做好了风控——最终决定买不买的还是你。规则只是护栏，方向盘在你手上。","tags":["投资风控","监管","个人判断","责任","有知有行"]},{"id":"m099","title":"积小胜为大胜","coreView":"低收益环境中，追求大胜的风险回报比不如积累小胜。当整体回报率下降时，投资策略应主动从\"追求超额收益\"切换到\"力求控制波动\"——通过降低单次回撤的幅度，把时间拉长来看，积小胜的累计效果反而可能超过来回大起大落的激进策略。这不是保守，是在低利率低增速时代找到的最优风险收益曲线。","example":"年化收益只有3%的时候，别想着翻倍。先稳住不要让本金缩水。一年亏10%需要明年赚11%才能回来。不急、不贪、慢慢来反而最快。","tags":["投资策略","低利率","风险控制","保守","有知有行"]},{"id":"m100","title":"全球资产配置分散论","coreView":"对中国投资者来说，配置海外资产不是为了追逐高收益，而是为了利用国内外资产之间的较低相关性来提升整个组合的风险调整后收益。历史数据验证：加入海外资产后，长期收益不降反升，整体风险不升反降。坚持低成本的指数化策略和股债分散配置，比择时买卖更重要。关键是结构配置，不是时机选择。","example":"只买A股意味着中国房价跌、经济放缓时你的所有钱跟着跌。买一些美股QDII和港股ETF，两边不同时跌——组合波动小一半，长期收益反而更高。","tags":["海外投资","QDII","资产配置","风险分散","有知有行"]},{"id":"m101","title":"生命持续做功论","coreView":"生命是耗散结构，必须通过不断与外界交换能量（做功）来维持内在秩序。\"财务自由\"是对虚幻确定性的向往——人生没有静止的安全点，自行车一旦完全停止反而更容易倒下。退休不是奖赏，停止做功即是枯萎。财富的真正价值不是买断不确定性，而是提供\"拒绝妥协\"的本钱和\"跨越时间\"的冗余。","example":"一个退休的人如果什么都不做，半年后精神状态会明显下降。人需要持续'做功'——工作、学习、创造——来维持内在秩序。'财务自由'不是终点，自行车完全停下时最不稳。","tags":["生命哲学","耗散结构","退休","财务自由","意义"]},{"id":"m102","title":"稀缺性价值锚定论","coreView":"价值永远落在稀缺那一头。当AI几乎什么都能干，真正需要回答的不是\"AI会取代什么\"，而是\"当机器几乎什么都能干，什么东西还是稀缺的\"。AI的能力增长不会让稀缺资源变得不稀缺，反而可能加剧竞争。真正的价值锚点在那些AI无法大批量生产的东西：专有数据（网络效应）、独特的人类判断力、物理资源、注意力。投资/创业不要盯着\"AI能做什么\"，要盯着\"AI做不了什么\"。","example":"现在大家都在追AI能做什么，你该想AI做不了什么——比如需要真实人物体验的'县城建材店做抖音需要什么'。稀缺性不在AI这边，在你自己身上。","tags":["经济学","AI时代","稀缺性","价值判断","资产配置"]},{"id":"m103","title":"逆周期暗线布局论","coreView":"蔚来2020年账上现金不足10亿元、刚从退市边缘爬回时，任少卿加入从零搭建智驾团队。六年后的今天，70万车主同步收到跨品牌跨平台的智驾OTA升级——这是中国汽车史上规模最大的智驾推送。真正的战略优势不是在高光时刻大力投入，而是在最困难的时候不放弃那条\"暗线\"。逆周期布局需要两个前提：对终局的坚定的判断力 + 有能力活到兑现的那一天。无声的推送来自六年前无声的坚持。","example":"蔚来2020年快倒闭了，还敢往智驾投钱。不是疯了，是他们相信电动车终局是智能化的。六年后的今天70万车主收到OTA更新——当时拼命保的暗线成了核武器。","tags":["战略","长期主义","逆周期","企业决策","布局"]},{"id":"m104","title":"非共识夹缝定位论","coreView":"大厂都在做的事你不可能做出差异化。王小川选择做\"大模型+医疗\"而非通用大模型，因为大厂不会深度投入到医疗这个太重、太慢、门槛太高的垂直领域。非共识不是对立，是找到那个\"需要AI能力但被大厂忽视的夹缝\"——重、慢、需要专业深度。AI的终极形态不是通用的聊天机器人，而是深耕每个垂直领域的\"行业大脑\"。选择战场的标准：不是\"能不能赢\"，是\"大厂会不会来\"。","example":"王小川做AI不做通用大模型（大厂都做了），做AI医疗。这个赛道重、慢、大厂不愿意深度投入。不是更聪明，是选了不对抗的战场。","tags":["创业","AI","差异化","垂直领域","百川智能"]},{"id":"m105","title":"AI资产负债翻转论","coreView":"投资AI技术本身有一个根本性风险：技术迭代速度可能把你今天的资产变成明天的负债。模型参数、架构优势可能在下一版本发布时被轻松抹平。你在AI基础设施上的投入越大，被\"创造性毁灭\"的风险可能越高。真正持久的壁垒不在AI技术本身，而在于那些AI消耗不完的稀缺资源：数据网络效应、专有数据资产、用户行为锁定、行业纵深认知。评估AI投资时，必须区分\"技术壁垒\"和\"结构壁垒\"。","example":"你花100万买了最新算力卡做AI应用。6个月后新模型参数翻倍，你的算力卡优势变成劣势。今天的技术资产明天可能变成负债——真正的壁垒不是技术，是用户和数据。","tags":["AI投资","风险","技术迭代","壁垒","资产贬值"]},{"id":"m106","title":"双重叙事博弈论","coreView":"经济决策中\"表层叙事\"（数据/利率/政策声明）和\"底层叙事\"（政治力量/权力结构/利益博弈）经常给出相反的信号。6月FOMC鹰派加息但纳指涨了近2%——因为市场读懂的不只是利率数字，而是背后沃什新主席的\"鹰派包裹鸽派内核\"的政治博弈。2026下半年的核心变量正从经济叙事走向政治叙事。只看表层数据会完全误读真实走向。","example":"美联储宣布加息，按理股市该跌。但如果你是懂王派的，你知道新主席沃什的加息的底色是鸽派——所以纳指反而涨了。表面数据和底层政治博弈完全不同。","tags":["市场分析","政治博弈","叙事","美联储","投资决策"]},{"id":"m107","title":"专业认知滤镜论","coreView":"医生和程序员对同一技术的认知完全不同：医生说\"AI是更好的听诊器\"（是工具），程序员看到\"整个医学知识体系可以被重写\"（是革命）。不同专业训练形成不同的\"认知滤镜\"——同一技术在不同人脑中的语义映射完全不同。跨领域协作时，最危险的假设是\"我理解的X\"等于\"他理解的X\"。技术越前沿，认知滤镜的差异越大。先识别对方的认知滤镜，再谈协作。","example":"你跟医生朋友聊AI医疗，他说'AI就是个更好的听诊器'。同一技术你看到的是'革命'，他看到的是'更好的工具'。认知滤镜让人看到完全不同的世界。","tags":["认知科学","跨领域","沟通","AI","专业训练"]},{"id":"m108","title":"国防赋能创新孵化论","coreView":"硅谷早期40%营收来自美国国防部订单，冷战结束后才大规模转向民用。惠普、仙童、Intel的第一桶金都来自军方采购。技术创新早期需要一个\"非市场化的稳定甲方\"来养育——这个客户不需要ROI最大化，只要求你能解决问题。纯市场验证固然美好，但技术突破的种子期往往需要非市场化的\"低保\"来渡过死亡谷。创新孵化的核心不是多少钱，而是谁愿意成为第一个非市场化付费用户。","example":"硅谷早期30%-40%收入来自美国军方订单。不是靠风投、不是靠市场验证——靠的是国防部这个'不要求ROI'的甲方。技术创新的种子期需要一个愿意买单的非市场化甲方。","tags":["创新","硅谷","国防","非市场化","产业孵化"]},{"id":"m109","title":"组织认知熵增论","coreView":"谷歌48小时内连失两位顶级AI科学家（Noam Shazeer和John Jumper），折射的不是薪酬问题，而是组织\"认知方向\"与最聪明的人之间产生了不可调和的偏离。核心人才批量离开不是薪酬信号——是组织信仰的晴雨表。人才是组织认知熵增的最敏感传感器——当熵增超过临界值，最敏感的人最先离开。留住顶尖人才的本质不是加钱，是持续让最聪明的人确认\"我们在做正确的事\"。","example":"谷歌48小时内两名顶级AI科学家离职。不是因为钱少——是他们觉得谷歌做的方向不是他们想做的了。人才批量离开是组织方向跑偏的警报器。","tags":["组织管理","人才流失","信仰","谷歌","AI人才"]},{"id":"m110","title":"场景共建获客论","coreView":"银行赞助\"苏超\"\"吴越杯\"等城市足球联赛，买的不是曝光流量，而是用户对本地体育IP的身份认同。企业家和银行经理因为聊球赛而拉近距离——话题不是利率和贷款，是金华队那场球踢得真棒。以本地化共建为核心的获客，核心逻辑是：让用户觉得\"这是我们自己的联赛\"比\"你们银行的广告真精准\"更有社交货币价值。场景共建 + 身份认同 > 流量精准投放。","example":"银行赞助金华城市足球联赛，球迷去银行办事时会聊'你是金华的？那场球踢得真好'。不是买流量，是买'我们是一伙的'这个身份感。","tags":["营销","获客","本地化","身份认同","场景"]},{"id":"m111","title":"成功平方根定律","coreView":"","example":"你写了50篇文章只有1篇爆款。别放弃。根据平方根定律，要15篇爆款大概需要225次尝试。前面那49篇不是失败，是垫脚石。耐性是数学必然。","tags":[]},{"id":"m112","title":"战略性思维晋升论","coreView":"","example":"你是公司技术最好的测试员，但升不了主管。因为你只想着'把Bug测出来'，没想过'怎么提升整个团队的质量意识'。从'做对事'到'决定该做什么事'才是晋升的跨越。","tags":[]},{"id":"m113","title":"AI落地价值大于模型能力论","coreView":"","example":"OpenAI现在最缺的不是模型科学家，而是去客户现场部署、改流程、对接系统的工程师。模型95分成绩不够，能让客户用起来变成100分体验的人才值钱。不是研究能力，是落地能力。","tags":[]},{"id":"m114","title":"概念标签陷阱论","coreView":"","example":"你的产品被贴上'AI教育'标签后，融资变容易了。但投资人开始问你为什么不加这个AI功能、不加那个AI模块。标签让你更好融资，也框死了你的战略自由。命名即限制。","tags":[]},{"id":"m115","title":"体验型消费升级论","coreView":"","example":"现在年轻人不去三亚拍照了，去清迈学做冬阴功、去景德镇学拉坯。带回的不是照片，是一张结业证书。消费从'我去过'变成了'我会做'。","tags":[]},{"id":"m116","title":"AI组织重塑优先于AI工具采购论","coreView":"","example":"公司买了企业版AI工具，员工用了两个月人效没变化。为什么？因为审核流程还没改——AI写完了报告还要等主管批准，最慢的环节没变。先重设计流程，再买工具。","tags":[]},{"id":"m117","title":"品牌主权决定战略自由度论","coreView":"","example":"必胜客在中国开了9年，菜单85%是全球统一标准。百胜花81亿买回品牌权后，第一件事改菜单：上小龙虾披萨、榴莲披萨。没有品牌主权，连菜单都改不了。","tags":[]},{"id":"m118","title":"流量不等于明星壁垒论","coreView":"","example":"短剧演员一夜爆红，播放量10亿。但下个月没人记得他的名字。真正的明星是用户主动搜索关注的、不同平台都跟着跑的。流量可以被买，粉丝盘买不来。","tags":[]},{"id":"m119","title":"并购即数据获取论","coreView":"","example":"一个物流公司被收购了。值钱的不是它的团队和年营收，是它500个物流项目跑了几年的真实数据。这个数据实验室里永远造不出来。并购=买到别人积累的真实世界数据。","tags":[]}];

const network = new vis.Network(container, { nodes, edges: edgeData }, options);

network.on('click', function(params) {
  if (params.nodes.length === 0) { tooltip.style.display = 'none'; return; }
  const id = params.nodes[0];
  const m = models.find(x => x.id === id);
  if (!m) return;
  tooltip.innerHTML = '<div class="tt-title">' + m.title + '</div>' +
    '<div class="tt-id">' + m.id + ' · ' + (m.tags || []).join(' · ') + '</div>' +
    '<div class="tt-view">' + (m.coreView || '') + '</div>' +
    (m.example ? '<div class="tt-example">💡 ' + m.example + '</div>' : '');
  tooltip.style.display = 'block';
});

network.on('deselectNode', function() { tooltip.style.display = 'none'; });
